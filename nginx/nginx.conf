user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
	
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
	'$status $body_bytes_sent "$http_referer" '
	'"$http_user_agent"';
	
    access_log /var/log/nginx/access.log main;
	
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
	
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=comment:10m rate=5r/h;
	
    upstream backend {
        server backend:8000;
	}
	
    upstream frontend {
        server frontend:3000;
	}
	
	server {
        listen 80;
        server_name _;
        
        client_max_body_size 10M;
		
        # Static files (Django)
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
		}
		# 🔹 Фавиконки и статика — приоритетная раздача
		location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|manifest|json)$ {
			root /opt/taxi-rating/frontend/public;  
			expires 30d;
			add_header Cache-Control "public, immutable";
			access_log off;
			try_files $uri =404;
		}
		
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
		}
		# 🔹 Статические SEO-файлы
        location = /robots.txt {
            alias /opt/taxi-rating/frontend/public/robots.txt;
            access_log off;
            log_not_found off;
            add_header Content-Type text/plain;
        }

        location = /sitemap.html {
            alias /opt/taxi-rating/frontend/public/sitemap.html;
            access_log off;
            add_header Content-Type text/html;
        }

        # 🔹 XML-сайтмап через Next.js API
        location /sitemap.xml {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Content-Type application/xml;
        }
		
        # Django Admin
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
		}
		
        # Django API
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
		}
		
        # Next.js Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
		}
		
        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
		}
	}
}